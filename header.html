<style>
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 64px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(226,232,240,0.8);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-mark { width: 38px; height: 38px; background: transparent; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: none; }
  .logo-mark img { width: 100%; height: 100%; object-fit: contain; }
  .logo-name { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; color: #0F172A; letter-spacing: -0.3px; }
  .logo-name em { color: #1560FF; font-style: normal; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-pill { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 18px; border-radius: 50px; text-decoration: none; border: none; cursor: pointer; transition: transform 0.15s, opacity 0.15s; white-space: nowrap; }
  .nav-pill:hover { transform: translateY(-1px); opacity: 0.92; }
  .pill-ghost { background: transparent; color: #0F172A; border: 1.5px solid #CBD5E1; padding: 8px 16px; }
  .pill-ghost:hover { border-color: #1560FF; color: #1560FF; transform: none; }
  
  .mob-top-nav { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 300; height: 60px; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); border-bottom: 1.5px solid #E2E8F0; padding: 0 1.25rem; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .mob-top-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .mob-top-hamburger { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; width: 40px; height: 40px; background: #F1F5F9; border: 1.5px solid #CBD5E1; border-radius: 10px; cursor: pointer; flex-shrink: 0; }
  .mob-top-hamburger span { display: block; width: 16px; height: 2px; background: #0F172A; border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
  .mob-top-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .mob-top-hamburger.open span:nth-child(2) { opacity: 0; }
  .mob-top-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  
  .mob-drop-menu { display: none; position: fixed; top: 60px; left: 0; right: 0; z-index: 299; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-bottom: 1.5px solid #E2E8F0; padding: 0.75rem 1.25rem 1.25rem; flex-direction: column; gap: 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-radius: 0 0 20px 20px; }
  .mob-drop-menu.open { display: flex; }
  .mob-link { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: #0F172A; text-decoration: none; padding: 0.85rem 1rem; border-radius: 10px; display: block; transition: background 0.15s, color 0.15s; }
  .mob-link:hover { background: #EEF3FF; color: #1560FF; }
  
  @media (max-width: 720px) {
    nav { display: none; }
    .mob-top-nav { display: flex; }
  }
</style>

<style>
  .nav-logo {
    display: flex;

<nav id="nav"></nav>
<div class="mob-top-nav">
  <a href="index.html" class="mob-top-logo">
    <div class="logo-mark"><img src="logo.png" alt="FixMyPC Perth"></div>
    <span class="logo-name" style="font-size:14px">FixMyPC <em>Perth</em></span>
  </a>
  <button class="mob-top-hamburger" id="mob-top-hamburger" aria-label="Open menu">

</div>

<script>
  const WA = `https://wa.me/61452573701?text=${encodeURIComponent('Hi! I\'d like a free quote for PC repair.')}`;
  
  document.getElementById('nav').innerHTML = `
    <a href="index.html" class="nav-logo">
      <div class="logo-mark"><img src="logo.png" alt="FixMyPC Perth"></div>
      <span class="logo-name">FixMyPC <em>Perth</em></span>
    </a>
    <div class="nav-right">
      <a href="pricing.html" class="nav-pill pill-ghost">Pricing</a>
      <a href="quiz.html" class="nav-pill pill-ghost">Free PC Diagnostic</a>
      <a href="blog.html" class="nav-pill pill-ghost">Blog</a>
      <a href="reviews.html" class="nav-pill pill-ghost">Reviews & FAQ</a>
    </div>`;
  
  const hamburger = document.getElementById('mob-top-hamburger');
  const mobMenu = document.getElementById('mob-drop-menu');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobMenu.classList.toggle('open');
  });
  mobMenu.querySelectorAll('.mob-link').forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('open');
      mobMenu.classList.remove('open');
    });
  });
</script>
