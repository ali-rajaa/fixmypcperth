<script>
  let activeFilter = 'All';
  let isExpanded = false;

  const hamburger = document.getElementById('hamburger');
  const mobMenu   = document.getElementById('mob-menu');
  const showMoreBtn = document.getElementById('show-more-btn');

  hamburger.addEventListener('click', () => { 
    hamburger.classList.toggle('open'); 
    mobMenu.classList.toggle('open'); 
  });

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
  }

  const allCats = ['All', ...new Set(BLOG_POSTS.map(p => p.category))];

  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = allCats.map(c =>
    `<button class="filter-btn${c === 'All' ? ' active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');

  filterBar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.cat;
      filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      isExpanded = false;
      renderPosts();
    });
  });

  function renderPosts() {
    const grid = document.getElementById('blog-grid');
    let filtered = activeFilter === 'All' 
      ? [...BLOG_POSTS] 
      : BLOG_POSTS.filter(p => p.category === activeFilter);

    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

    let displayed = filtered;

    if (!isExpanded && activeFilter === 'All') {
      // Show Featured + 3 regular posts
      const featured = filtered.find(p => p.featured);
      const regulars = filtered.filter(p => !p.featured).slice(0, 3);
      displayed = featured ? [featured, ...regulars] : regulars.slice(0, 4);
    } else if (!isExpanded) {
      displayed = filtered.slice(0, 4);
    }

    grid.innerHTML = displayed.map((post) => {
      if (post.featured && activeFilter === 'All') {
        return `
          <a href="blog/${post.slug}.html" class="post-featured fade-up">
            <div>
              <div class="feat-eyebrow">Featured Post · ${post.category}</div>
              <div class="feat-title">${post.title}</div>
              <div class="feat-excerpt">${post.excerpt}</div>
              <div class="feat-meta">
                <span>${fmtDate(post.date)}</span>
                <span>·</span>
                <span>${post.readMin} min read</span>
              </div>
            </div>
            <div class="feat-read-btn">Read article →</div>
          </a>`;
      }
      return `
        <a href="blog/${post.slug}.html" class="post-card fade-up">
          <span class="post-cat">${post.category}</span>
          <div class="post-title">${post.title}</div>
          <div class="post-excerpt">${post.excerpt}</div>
          <div class="post-footer">
            <span>${fmtDate(post.date)} · ${post.readMin} min read</span>
            <span class="post-read-more">Read →</span>
          </div>
        </a>`;
    }).join('');

    // Button logic
    const total = filtered.length;
    showMoreBtn.style.display = total > 4 ? 'block' : 'none';
    showMoreBtn.textContent = isExpanded ? "Show Less" : "Show More Posts";
  }

  showMoreBtn.addEventListener('click', () => {
    isExpanded = !isExpanded;
    renderPosts();
  });

  // Intersection Observer (original)
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('in'), i * 60);
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.06 });

  renderPosts();
</script>
